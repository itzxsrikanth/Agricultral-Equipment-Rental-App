{% extends 'base.html' %}

{% block title %}Register - AgriRent{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4 mt-4" style="border-radius: 20px;">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Join AgriRent</h2>
                    <p class="text-muted">Create an account to rent or host equipment</p>
                </div>
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required style="border-radius: 10px;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="text" id="phone" name="phone" class="form-control" placeholder="+91 9876543210" style="border-radius: 10px;">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required style="border-radius: 10px;">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Select Role</label>
                        <select id="role" name="role" class="form-select" required style="border-radius: 10px;">
                            <option value="farmer">Farmer (Renter)</option>
                            <option value="owner">Owner (Lender)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="border-radius: 10px;">
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2">Sign Up</button>
                </form>
                <div class="text-center mt-3 small text-muted">
                    Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
