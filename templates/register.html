{% extends 'base.html' %}

{% block title %}Register - AgriRent{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4 mt-4" style="border-radius: 20px;">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Join AgriRent</h2>
                    <p class="text-muted">Create an account to rent or host equipment</p>
                </div>
                <div class="alert alert-info py-2 small text-center" style="border-radius: 8px;">
                    <i class="bi bi-info-circle-fill me-1"></i> Authentication will be activated in Phase 2!
                </div>
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="John Doe" disabled style="border-radius: 10px;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" class="form-control" placeholder="+123456789" disabled style="border-radius: 10px;">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" disabled style="border-radius: 10px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Role</label>
                        <select class="form-select" disabled style="border-radius: 10px;">
                            <option>Farmer (Renter)</option>
                            <option>Owner (Lender)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" disabled style="border-radius: 10px;">
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2" disabled>Sign Up</button>
                </form>
                <div class="text-center mt-3 small text-muted">
                    Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
