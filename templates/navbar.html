<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <!-- Logo Brand -->
        <a class="navbar-brand" href="{{ url_for('index') }}">
            <i class="bi bi-sprout-fill"></i>
            <span>AgriRent</span>
        </a>
        
        <!-- Toggle button for mobile -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom {% if request.endpoint == 'equipment.list_equipment' %}active{% endif %}" href="{{ url_for('equipment.list_equipment') }}">Browse Equipment</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="#how-it-works">How It Works</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="#faq">FAQ</a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                {% if current_user.is_authenticated %}
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 border" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false" style="border-radius: 20px; padding: 6px 16px;">
                            <img src="{{ url_for('static', filename='images/' + current_user.profile_image) if current_user.profile_image else url_for('static', filename='images/default.jpg') }}" alt="Profile" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover;">
                            <span>{{ current_user.name }}</span>
                            <span class="badge bg-success-subtle text-success text-capitalize px-2 py-1" style="font-size: 0.75rem;">{{ current_user.role }}</span>

                                <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2" href="#">
