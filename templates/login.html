{% extends 'base.html' %}

{% block title %}Login - AgriRent{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 mt-5" style="border-radius: 20px;">
                <div class="text-center mb-4">
                    <i class="bi bi-sprout-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Welcome Back</h2>
                    <p class="text-muted">Sign in to manage your rentals and listings</p>
                </div>
                <div class="alert alert-info py-2 small text-center" style="border-radius: 8px;">
                    <i class="bi bi-info-circle-fill me-1"></i> Authentication will be activated in Phase 2!
                </div>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" disabled style="border-radius: 10px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" disabled style="border-radius: 10px;">
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2" disabled>Sign In</button>
                </form>
                <div class="text-center mt-3 small text-muted">
                    Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
