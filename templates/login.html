{% extends 'base.html' %}

{% block title %}Login - AgriRent{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 mt-5" style="border-radius: 20px;">
                <div class="text-center mb-4">
                    <i class="bi bi-sprout-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Welcome Back</h2>
                    <p class="text-muted">Sign in to manage your rentals and listings</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required style="border-radius: 10px;">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="border-radius: 10px;">
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2">Sign In</button>
                </form>
                <div class="text-center mt-3 small text-muted">
                    Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
