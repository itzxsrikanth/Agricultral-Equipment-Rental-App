{% extends 'base.html' %}
{% block title %}My Profile - AgriRent{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center pt-4">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-5" style="border-radius:24px;">
                <!-- Profile Header -->
                <div class="text-center mb-4">
                    <div class="mx-auto mb-3 d-flex align-items-center justify-content-center"
                         style="width:90px;height:90px;border-radius:50%;background:var(--secondary-light);border:3px solid var(--secondary);">
                        <span style="font-size:2.5rem;font-weight:800;color:var(--primary);">
                            {{ current_user.name[0].upper() }}
                        </span>
                    </div>
                    <h3 class="fw-bold mb-1">{{ current_user.name }}</h3>
                    <span class="badge bg-success-subtle text-success text-capitalize px-3 py-2" style="border-radius:20px;">
                        {{ current_user.role }}
                    </span>
                </div>

                <form method="POST" action="{{ url_for('profile.profile') }}">
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" value="{{ current_user.name }}" required style="border-radius:10px;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control bg-light" value="{{ current_user.email }}" disabled style="border-radius:10px;">
                            <div class="form-text">Email cannot be changed.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label fw-semibold">Phone Number</label>
                            <input type="text" id="phone" name="phone" class="form-control" value="{{ current_user.phone or '' }}" style="border-radius:10px;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Role</label>
                            <input type="text" class="form-control bg-light text-capitalize" value="{{ current_user.role }}" disabled style="border-radius:10px;">
                        </div>
                    </div>

                    <hr class="my-4 text-muted opacity-25">
                    <h6 class="fw-bold mb-3 text-muted text-uppercase" style="letter-spacing:1px;font-size:0.75rem;">Change Password (optional)</h6>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="current_password" class="form-label fw-semibold">Current Password</label>
                            <input type="password" id="current_password" name="current_password" class="form-control" placeholder="••••••••" style="border-radius:10px;">
                        </div>
                        <div class="col-md-6">
                            <label for="new_password" class="form-label fw-semibold">New Password</label>
                            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="••••••••" style="border-radius:10px;">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 py-3">
                        <i class="bi bi-check2-circle me-2"></i>Save Changes
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{{ url_for('booking.list_bookings') }}" class="btn btn-outline-secondary px-4" style="border-radius:20px;">
                        <i class="bi bi-calendar3 me-1"></i>View My Bookings
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
